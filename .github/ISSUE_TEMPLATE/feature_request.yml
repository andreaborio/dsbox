name: Feature request
description: Propose a focused Hebrus Studio improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user need rather than only the proposed interface.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Explain the smallest useful behavior and any alternatives considered.
    validations:
      required: true
  - type: dropdown
    id: boundary
    attributes:
      label: Primary boundary
      options:
        - Desktop UI
        - Engine bridge
        - Model catalog
        - Packaging or releases
        - Documentation
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Note any effect on persisted state, engine versions, model formats, or rollback.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include secrets, private prompts, personal paths, traces, or model data.
          required: true
