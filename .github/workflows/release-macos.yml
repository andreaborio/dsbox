name: Release macOS DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Verify release version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$GITHUB_REF_NAME" != "v${VERSION}" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v${VERSION}." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Enforce public-release readiness before build
        env:
          HEBRUS_HOSTED_CI_COMMIT: ${{ vars.HEBRUS_HOSTED_CI_COMMIT }}
          HEBRUS_MODEL_BACKED_STUDIO_COMMIT: ${{ vars.HEBRUS_MODEL_BACKED_STUDIO_COMMIT }}
          HEBRUS_MODEL_BACKED_ENGINE_COMMIT: ${{ vars.HEBRUS_MODEL_BACKED_ENGINE_COMMIT }}
        run: npm run release:readiness:strict
      - name: Require Developer ID and notarization credentials
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          for secret_name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Required release secret $secret_name is missing." >&2
              exit 1
            fi
          done
      - run: npm run typecheck
      - run: npm run check:brand
      - run: npm test
      - name: Generate exact-commit release provenance
        run: npm run release:provenance
      - name: Build Developer ID signed and app-notarized DMG
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:mac
      - name: Notarize and staple the final DMG
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG="release/Hebrus-Studio-${{ steps.version.outputs.version }}-macOS-arm64.dmg"
          codesign --verify --verbose=2 "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
      - name: Verify packaged application and embedded provenance
        env:
          HEBRUS_VERIFY_COMMIT: ${{ github.sha }}
          HEBRUS_VERIFY_TAG: ${{ github.ref_name }}
        run: npm run verify:mac
      - name: Generate and validate CycloneDX SBOM from package-lock
        shell: bash
        run: |
          set -euo pipefail
          SBOM_PATH="release/Hebrus-Studio-${{ steps.version.outputs.version }}-SBOM.cdx.json"
          LICENSES_PATH="release/Hebrus-Studio-${{ steps.version.outputs.version }}-THIRD-PARTY-LICENSES.md"
          npm sbom --sbom-format cyclonedx --sbom-type application --package-lock-only \
            | node scripts/normalize-release-sbom.mjs --provenance build/release-provenance.json > "$SBOM_PATH"
          node scripts/validate-release-sbom.mjs "$SBOM_PATH" --provenance build/release-provenance.json
          node scripts/create-release-license-inventory.mjs "$SBOM_PATH" "$LICENSES_PATH"
      - name: Verify upgrade and rollback against the final DMG
        env:
          HEBRUS_VERIFY_COMMIT: ${{ github.sha }}
          HEBRUS_VERIFY_TAG: ${{ github.ref_name }}
        run: npm run verify:upgrade-rollback:e2e -- --release
      - name: Create and validate final release checksums
        run: |
          npm run release:checksums
          npm run release:checksums:validate
      - name: Verify final packaged application and checksums
        env:
          DSBOX_VERIFY_CHECKSUMS: "1"
          HEBRUS_VERIFY_COMMIT: ${{ github.sha }}
          HEBRUS_VERIFY_TAG: ${{ github.ref_name }}
        run: npm run verify:mac
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "release/Hebrus-Studio-${{ steps.version.outputs.version }}-macOS-arm64.dmg#Hebrus Studio for Apple Silicon" \
            "release/Hebrus-Studio-${{ steps.version.outputs.version }}-SBOM.cdx.json#CycloneDX SBOM" \
            "release/Hebrus-Studio-${{ steps.version.outputs.version }}-THIRD-PARTY-LICENSES.md#Third-party license inventory" \
            "release/Hebrus-Studio-${{ steps.version.outputs.version }}-Upgrade-Rollback-E2E.json#Upgrade and rollback evidence" \
            "release/Hebrus-Studio-${{ steps.version.outputs.version }}-Upgrade-Rollback-E2E.log#Upgrade and rollback log" \
            "release/SHA256SUMS.txt#SHA-256 checksum" \
            "docs/INSTALL-macOS.md#Installation guide" \
            --verify-tag \
            --title "Hebrus Studio ${{ steps.version.outputs.version }}" \
            --notes-file docs/RELEASE-NOTES-macOS.md
