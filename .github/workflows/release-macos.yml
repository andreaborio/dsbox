name: Release macOS DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 25
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify release version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$GITHUB_REF_NAME" != "v${VERSION}" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v${VERSION}." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - run: npm run typecheck
      - run: npm test
      - run: npm run dist:mac
      - name: Verify packaged application
        run: npm run verify:mac
      - name: Create checksum
        shell: bash
        run: |
          cd release
          shasum -a 256 "DSBox-${{ steps.version.outputs.version }}-macOS-arm64.dmg" > SHA256SUMS.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "release/DSBox-${{ steps.version.outputs.version }}-macOS-arm64.dmg#DSBox for Apple Silicon" \
            "release/SHA256SUMS.txt#SHA-256 checksum" \
            "docs/INSTALL-macOS.md#Installation guide" \
            --verify-tag \
            --title "DSBox ${{ steps.version.outputs.version }}" \
            --notes-file docs/RELEASE-NOTES-macOS.md
