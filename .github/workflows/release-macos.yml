name: Release macOS DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 25
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Verify release version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$GITHUB_REF_NAME" != "v${VERSION}" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v${VERSION}." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - run: npm run typecheck
      - run: npm run check:brand
      - run: npm test
      - run: npm run dist:mac
      - name: Create checksum
        shell: bash
        run: |
          cd release
          shasum -a 256 "Hebrus-Studio-${{ steps.version.outputs.version }}-macOS-arm64.dmg" > SHA256SUMS.txt
      - name: Verify packaged application and checksum
        env:
          DSBOX_VERIFY_CHECKSUMS: "1"
        run: npm run verify:mac
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "release/Hebrus-Studio-${{ steps.version.outputs.version }}-macOS-arm64.dmg#Hebrus Studio for Apple Silicon" \
            "release/SHA256SUMS.txt#SHA-256 checksum" \
            "docs/INSTALL-macOS.md#Installation guide" \
            --verify-tag \
            --title "Hebrus Studio ${{ steps.version.outputs.version }}" \
            --notes-file docs/RELEASE-NOTES-macOS.md
