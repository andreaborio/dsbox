name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: dsbox-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, tests, build, and dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Report public-release readiness without authorizing release
        run: npm run release:readiness
      - run: npm run typecheck
      - run: npm run check:brand
      - run: npm test
      - run: npm run build

  macos-package:
    name: macOS arm64 package contract
    runs-on: macos-15
    timeout-minutes: 25
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      CSC_FOR_PULL_REQUEST: "true"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Report public-release readiness without authorizing release
        run: npm run release:readiness
      - run: npm run pack:mac
      - name: Verify local-development packaged application contract
        run: npm run verify:mac:dev -- "release/mac-arm64/Hebrus Studio.app"
      - name: Verify packaged legacy upgrade and rollback
        run: npm run verify:upgrade-rollback:e2e -- --source
