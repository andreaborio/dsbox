appId: com.dsbox.desktop
productName: Hebrus Studio
artifactName: Hebrus-Studio-${version}-macOS-${arch}.${ext}
asar: true
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-server/**/*
  - desktop/**/*
  - package.json
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
  icon: build/icon.icns
  # Ad-hoc signing gives Apple Silicon a structurally valid, sealed bundle.
  # It does not establish a publisher identity or notarize the app.
  identity: "-"
  hardenedRuntime: false
  minimumSystemVersion: "13.0"
  darkModeSupport: true
dmg:
  title: Hebrus Studio ${version}
  backgroundColor: "#f7f7f5"
  window:
    width: 600
    height: 410
  contents:
    - x: 160
      y: 205
      type: file
    - x: 440
      y: 205
      type: link
      path: /Applications
