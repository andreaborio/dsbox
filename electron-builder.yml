appId: com.dsbox.desktop
productName: Hebrus Studio
artifactName: Hebrus-Studio-${version}-macOS-${arch}.${ext}
asar: true
forceCodeSigning: true
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-server/**/*
  - desktop/**/*
  - package.json
extraResources:
  - from: build/release-provenance.json
    to: release-provenance.json
  - from: LICENSE
    to: LICENSE.txt
  - from: THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
  - from: node_modules/electron/dist/LICENSE
    to: LICENSE.electron.txt
  - from: node_modules/electron/dist/LICENSES.chromium.html
    to: LICENSES.chromium.html
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
  icon: build/icon.icns
  hardenedRuntime: true
  notarize: true
  minimumSystemVersion: "13.0"
  darkModeSupport: true
dmg:
  sign: true
  title: Hebrus Studio ${version}
  backgroundColor: "#f7f7f5"
  window:
    width: 600
    height: 410
  contents:
    - x: 160
      y: 205
      type: file
    - x: 440
      y: 205
      type: link
      path: /Applications
